    <script type=text/javascript>
      (function () {
        function toFsPath(path) {
          if (!path) {
            return "";
          }
          var normalized = path.toString();
          if (normalized.indexOf("file:///") === 0) {
            normalized = decodeURI(normalized.substring(8));
          } else if (normalized.indexOf("file://") === 0) {
            normalized = decodeURI(normalized.substring(7));
          }
          return normalized.replace(/\//g, "\\");
        }

        function getLogsDir() {
          var fallback = "%APPDATA%\\Adobe\\After Effects\\Logs";
          if (!window.__adobe_cep__) {
            return fallback;
          }
          var userData = window.__adobe_cep__.getSystemPath("userData");
          userData = toFsPath(userData);
          if (!userData) {
            return fallback;
          }
          return userData + "\\Adobe\\After Effects\\Logs";
        }

        function writeStartupError(message, errorObj) {
          try {
            if (!window.cep || !window.cep.fs) {
              return;
            }
            var logsDir = getLogsDir();
            window.cep.fs.makedir(logsDir);

            var now = new Date();
            var isoDate = now.toISOString().replace(/[:.]/g, "-");
            var logPath = logsDir + "\\ayon-aftereffects-panel-error-" + isoDate + ".log";
            var stack = "";
            if (errorObj && errorObj.stack) {
              stack = errorObj.stack;
            }
            var payload = [
              "timestamp=" + now.toISOString(),
              "message=" + message,
              "stack=" + stack
            ].join("\n");
            window.cep.fs.writeFile(logPath, payload);
          } catch (ignoreError) {
          }
        }

        window.addEventListener("error", function (event) {
          if (!event) {
            writeStartupError("Unknown startup error", null);
            return;
          }
          writeStartupError(
            "Uncaught error: " + event.message + " (" + event.filename + ":" + event.lineno + ":" + event.colno + ")",
            event.error
          );
        });

        window.addEventListener("unhandledrejection", function (event) {
          var reason = event && event.reason ? event.reason.toString() : "unknown";
          writeStartupError("Unhandled promise rejection: " + reason, event.reason);
        });
      }());
    </script>
